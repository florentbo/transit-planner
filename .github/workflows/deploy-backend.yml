name: Deploy Backend to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'api-spec/**'
      - 'Dockerfile'
      - '.dockerignore'

env:
  PROJECT_ID: transport-login
  SERVICE: transit-planner-backend
  REGION: europe-west1
  IMAGE: europe-west1-docker.pkg.dev/transport-login/cloud-run-source-deploy/transit-planner-backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v3

      - run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - run: docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest .

      - run: docker push $IMAGE --all-tags

      - run: |
          gcloud run deploy $SERVICE \
            --image $IMAGE:${{ github.sha }} \
            --region $REGION \
            --allow-unauthenticated \
            --memory 512Mi --cpu 1 \
            --min-instances 0 --max-instances 1 \
            --port 8080 \
            --set-env-vars "^||^STIB_API_KEY=${{ secrets.STIB_API_KEY }}||CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }}"
